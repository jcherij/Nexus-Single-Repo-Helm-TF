apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-nav-consumer
  namespace: {{ .Values.global.namespace }}
  labels:
    app: nexus-nav-consumer
spec:
  replicas: {{ .Values.navConsumer.replicaCount }}
  selector:
    matchLabels:
      app: nexus-nav-consumer
  template:
    metadata:
      labels:
        app: nexus-nav-consumer
    spec:
      serviceAccountName: {{ .Values.serviceAccounts.workload.name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

      containers:
        - name: nav-consumer
          image: "{{ .Values.navConsumer.image.repository }}:{{ .Values.navConsumer.image.tag }}"
          imagePullPolicy: {{ .Values.navConsumer.image.pullPolicy }}
          resources:
            requests:
              cpu: {{ .Values.navConsumer.resources.requests.cpu }}
              memory: {{ .Values.navConsumer.resources.requests.memory }}
            limits:
              cpu: {{ .Values.navConsumer.resources.limits.cpu }}
              memory: {{ .Values.navConsumer.resources.limits.memory }}
          env:
            - name: PUBSUB_SUBSCRIPTION
              value: "{{ .Values.api.env.PUBSUB_SUBSCRIPTION }}"
            - name: GCP_PROJECT_ID
              value: "{{ .Values.global.gcpProjectId }}"
            - name: DB_HOST
              value: "127.0.0.1"
            - name: DB_PORT
              value: "{{ .Values.cloudSqlProxy.port }}"
            - name: DB_NAME
              value: "{{ .Values.api.env.DB_NAME }}"
            - name: DB_USER
              value: "{{ .Values.api.env.DB_USER }}"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexus-db-credentials
                  key: password

        - name: cloud-sql-proxy
          image: "{{ .Values.cloudSqlProxy.image.repository }}:{{ .Values.cloudSqlProxy.image.tag }}"
          args:
            - "--structured-logs"
            - --port={{ .Values.cloudSqlProxy.port }}
            - {{ .Values.cloudSqlProxy.instanceConnectionName }}
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
